  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TIME_LIMIT_30 = 30;
    const SUDDEN_DEATH_PER_Q = 5;

    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }
    function playTone(freq, type = "sine", duration = 0.12, vol = 0.15, delay = 0) {
      try {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type; osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.start(t); osc.stop(t + duration);
      } catch {}
    }
    const playClick = () => playTone(880, "square", 0.05, 0.05);
    const playCorrect = () => { playTone(523, "sine", 0.1, 0.2); playTone(659, "sine", 0.1, 0.2, 0.08); playTone(784, "sine", 0.15, 0.25, 0.16); };
    const playWrong = () => { playTone(200, "sawtooth", 0.08, 0.15); playTone(150, "sawtooth", 0.12, 0.15, 0.08); };
    const playDigit = () => playTone(660, "triangle", 0.06, 0.08);
    const playCountdown = (n) => {
      if (n > 0) playTone(440, "sine", 0.15, 0.2);
      else { playTone(523, "sine", 0.1, 0.25, 0); playTone(659, "sine", 0.1, 0.25, 0.1); playTone(784, "sine", 0.2, 0.25, 0.2); }
    };
    const playTimeWarn = () => playTone(880, "square", 0.06, 0.1);
    const playWin = () => [523,659,784,1047,1319].forEach((f,i) => playTone(f, "sine", 0.2, 0.2, i * 0.1));

    let bgmRunning = false, bgmStep = 0, bgmTimeout = null, currentBgmType = null;
    const BGM_DATA = {
      menu:  { notes: [261, 329, 392, 329], tempo: 400 }, 
      play1: { notes: [261, 293, 329, 349, 392, 349, 329, 293], tempo: 220 }, 
      death: { notes: [329, 0, 392, 0, 440, 0, 392, 0], tempo: 150 }, 
    };
    function playBGM(type) {
      if (currentBgmType === type) return;
      stopBGM();
      if (!type || !BGM_DATA[type]) return;
      bgmRunning = true; currentBgmType = type; bgmStep = 0;

        if (!bgmRunning || currentBgmType !== type) return;
        const freq = track.notes[bgmStep % track.notes.length];
        if (freq > 0) playTone(freq, "triangle", track.tempo / 1000 * 0.8, 0.03, 0);
        bgmStep++; bgmTimeout = setTimeout(step, track.tempo);
      };
      step();
    }
    function stopBGM() { bgmRunning = false; currentBgmType = null; if (bgmTimeout) clearTimeout(bgmTimeout); }

    function generateQuestion(level, opType, mainMode, lastQuestion = "") {
      let q;
      do {
        if (mainMode === "addSub") {
          const useAdd = opType === "add" ? true : opType === "sub" ? false : Math.random() < 0.5;
          if (level === 1) {
            const a = Math.floor(Math.random() * 9) + 1;
            q = useAdd ? { question: `${a} + ? = 10`, answer: 10 - a } : { question: `10 - ${a} = ?`, answer: 10 - a };
          } else if (level === 2) {
            if (useAdd) {
              const a = Math.floor(Math.random() * 4) + 6, b = Math.floor(Math.random() * 5) + 5;
              q = { question: `${a} + ${b} = ?`, answer: a + b };
            } else {
              const ans = Math.floor(Math.random() * 8) + 2, sub = Math.floor(Math.random() * 7) + 3;
              q = { question: `${ans + sub} - ${sub} = ?`, answer: ans };
            }
          } else if (level === 3) {
            const a = Math.floor(Math.random() * 25) + 10, b = Math.floor(Math.random() * 15) + 10;
            q = useAdd ? { question: `${a} + ${b} = ?`, answer: a + b } : { question: `${a+b} - ${a} = ?`, answer: b };
          } else {
            const a = Math.floor(Math.random() * 60) + 20, b = Math.floor(Math.random() * 60) + 20;

                <div style={{ position: "absolute", left: 85, right: 85, top: 0, bottom: 0 }}>
                  {[...Array(duoGoal + 1)].map((_, i) => (<div key={i} style={{ position: 'absolute', height: '100%', width: 1, background: 'rgba(255,255,255,0.15)', left: `${(i / duoGoal) * 100}%` }} />))}
                  <div className="race-icon" style={{ left: `${(p2Score / duoGoal) * 100}%`, top: '5%', transform: 'translateX(-50%) rotate(180deg)', zIndex: 25 }}>{mainMode === "addSub" ? "🐹" : "🦊"}</div>
                  <div className="race-icon" style={{ left: `${(p1Score / duoGoal) * 100}%`, top: '45%', transform: 'translateX(-50%) rotate(0deg)', zIndex: 26 }}>{mainMode === "addSub" ? "🐻" : "🐼"}</div>
                </div>
              </div>

              <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
                <div style={{ textAlign:'center', color:'white', fontWeight:900, padding:8 }}>{mainMode === "addSub" ? "🐻" : "🐼"} {p1Name}</div>
                <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
                  {screen === "duo-countdown" ? <div className="countdown-text" style={{fontSize:'8rem', color:'#fffbe8'}}>{countdown}</div> : <GamePanel isMini current={q1} feedback={fb1} onAnswer={v => handleDuoAns(1, v)} score={p1Score} color="#7ee8fa" typed={typed1} />}
                  {winner && (
                    <div className="result-overlay">
                      <div className="result-band" style={{ background: winner === p1Name ? 'rgba(255, 87, 34, 0.85)' : 'rgba(15, 15, 35, 0.85)' }}>
                        {winner === p1Name ? "🎉 クリア！！" : "🏳️ そこまで！"}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {screen.includes("solo-countdown") && <div style={{ zIndex: 100, textAlign: "center" }}><p style={{ color: "white", fontSize: "2.5rem", fontWeight: 900 }}>よーい...</p><div className="countdown-text" style={{fontSize:'9rem', color:'#fffbe8'}}>{countdown}</div></div>}

          {screen.includes("result") && (
            <div className="mode-card" style={{ width: "95%", maxWidth: 420, zIndex: 1000, animation: "cPop 0.4s" }}>
              <div style={{ fontSize: "5.5rem" }}>🏆</div><h2 style={{ fontSize: "2.2rem", color: "#7a4500", margin: "10px 0", fontWeight: 900 }}>結果発表</h2>
              <div style={{ color: "#b08040", marginBottom: 25, fontWeight: 800 }}>{screen.includes("solo") ? <><div style={{fontSize:"1.6rem"}}>せいかい: {soloScore}問</div></> : <div style={{fontSize:"1.8rem"}}>{winner} さんの勝利！</div>}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}><button className="start-btn" onPointerDown={(e) => { e.preventDefault(); screen.includes("time") ? startSoloTime() : screen.includes("death") ? startSoloDeath() : startDuo(); }}>もう一回！</button><button className="start-btn" style={{ background: '#eee', color: '#666', boxShadow: '0 5px 0 #ccc' }} onPointerDown={(e) => { e.preventDefault(); goTop(); }}>タイトルへ</button></div>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
