<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>10チャレンジ！</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=M+PLUS+Rounded+1c:wght@700;800;900&display=swap');
    * {
      box-sizing:border-box; margin:0; padding:0;
      user-select:none; -webkit-touch-callout:none;
      font-family:'Nunito','M PLUS Rounded 1c',sans-serif;
    }
    body { margin:0; padding:0; overflow:hidden; touch-action:none; transition:background 0.5s; }
    #root { height:100vh; height:100dvh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TIME_LIMIT_30 = 30;
    const SUDDEN_DEATH_PER_Q = 5;

    let audioCtx = null;
    let isSoundEnabled = true;

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }
    function playTone(freq, type="sine", duration=0.12, vol=0.15, delay=0) {
      if (!isSoundEnabled) return;
      try {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type; osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.start(t); osc.stop(t + duration);
      } catch {}
    }
    const playClick   = () => playTone(880,"square",0.05,0.05);
    const playCorrect = () => { playTone(523,"sine",0.1,0.2); playTone(659,"sine",0.1,0.2,0.08); playTone(784,"sine",0.15,0.25,0.16); };
    const playWrong   = () => { playTone(200,"sawtooth",0.08,0.15); playTone(150,"sawtooth",0.12,0.15,0.08); };
    const playDigit   = () => playTone(660,"triangle",0.06,0.08);
    const playCountdown = (n) => {
      if (n>0) playTone(440,"sine",0.15,0.2);
      else { playTone(523,"sine",0.1,0.25,0); playTone(659,"sine",0.1,0.25,0.1); playTone(784,"sine",0.2,0.25,0.2); }
    };
    const playTimeWarn = () => playTone(880,"square",0.06,0.1);
    const playWin = () => [523,659,784,1047,1319].forEach((f,i)=>playTone(f,"sine",0.2,0.2,i*0.1));

    let bgmRunning=false, bgmStep=0, bgmTimeout=null, currentBgmType=null;
    const BGM_DATA = {
      menu:  { notes:[261,329,392,329],               tempo:400 },
      play1: { notes:[261,293,329,349,392,349,329,293], tempo:220 },
      death: { notes:[329,0,392,0,440,0,392,0],        tempo:150 },
    };
    function playBGM(type, force=false) {
      if (!isSoundEnabled) { stopBGM(); return; }
      if (!force && currentBgmType===type && bgmRunning) return;
      stopBGM();
      if (!type||!BGM_DATA[type]) return;
      bgmRunning=true; currentBgmType=type; bgmStep=0;
      const track = BGM_DATA[type];
      const step = () => {
        if (!bgmRunning||currentBgmType!==type||!isSoundEnabled||document.hidden) return;
        const freq = track.notes[bgmStep%track.notes.length];
        if (freq>0) playTone(freq,"triangle",track.tempo/1000*0.8,0.03,0);
        bgmStep++; bgmTimeout=setTimeout(step,track.tempo);
      };
      step();
    }
    function stopBGM() { bgmRunning=false; currentBgmType=null; if(bgmTimeout) clearTimeout(bgmTimeout); }

    function getBGMType(screen) {
      if (screen==="top"||screen.includes("menu")||screen.includes("setup")||screen.includes("result")) return "menu";
      if (screen==="solo-game-death") return "death";
      if (screen.includes("game")) return "play1";
      return null;
    }

    function generateQuestion(level, opType, mainMode, lastQuestion="") {
      let q;
      do {
        if (mainMode==="addSub") {
          const useAdd = opType==="add"?true:opType==="sub"?false:Math.random()<0.5;
          if (level===1) {
            const a=Math.floor(Math.random()*9)+1;
            q=useAdd?{question:`${a} + ? = 10`,answer:10-a}:{question:`10 - ${a} = ?`,answer:10-a};
          } else if (level===2) {
            if (useAdd) { const a=Math.floor(Math.random()*4)+6,b=Math.floor(Math.random()*5)+5; q={question:`${a} + ${b} = ?`,answer:a+b}; }
            else { const ans=Math.floor(Math.random()*8)+2,sub=Math.floor(Math.random()*7)+3; q={question:`${ans+sub} - ${sub} = ?`,answer:ans}; }
          } else if (level===3) {
            const a=Math.floor(Math.random()*25)+10,b=Math.floor(Math.random()*15)+10;
            q=useAdd?{question:`${a} + ${b} = ?`,answer:a+b}:{question:`${a+b} - ${a} = ?`,answer:b};
          } else {
            const a=Math.floor(Math.random()*60)+20,b=Math.floor(Math.random()*60)+20;
            q=useAdd?{question:`${a} + ${b} = ?`,answer:a+b}:{question:`${a+b} - ${a} = ?`,answer:b};
          }
        } else {
          const useMul=opType==="mul"?true:opType==="div"?false:Math.random()<0.5;
          if (level===1) {
            const a=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*5)+1;
            q=useMul?{question:`${a} × ${b} = ?`,answer:a*b}:{question:`${a*b} ÷ ${b} = ?`,answer:a};
          } else if (level===2) {
            const a=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*9)+1;
            q=useMul?{question:`${a} × ${b} = ?`,answer:a*b}:{question:`${a*b} ÷ ${b} = ?`,answer:a};
          } else if (level===3) {
            let a,b; do{a=Math.floor(Math.random()*89)+11;b=Math.floor(Math.random()*8)+2;}while((a%10)*(b%10)>=10);
            q=useMul?{question:`${a} × ${b} = ?`,answer:a*b}:{question:`${a*b} ÷ ${b} = ?`,answer:a};
          } else {
            let a,b; do{a=Math.floor(Math.random()*89)+11;b=Math.floor(Math.random()*8)+2;}while((a%10)*(b%10)<10);
            q=useMul?{question:`${a} × ${b} = ?`,answer:a*b}:{question:`${a*b} ÷ ${b} = ?`,answer:a};
          }
        }
      } while (q.question===lastQuestion);
      return q;
    }

    const RANKS=[
      {s:0,l:"見習い"},{s:5,l:"10級"},{s:10,l:"5級"},{s:15,l:"3級"},
      {s:20,l:"1級"},{s:30,l:"初段"},{s:45,l:"五段"},{s:60,l:"十段"}
    ];
    function getRankLabel(s) {
      let label=RANKS[0].l;
      for(let r of RANKS){if(s>=r.s)label=r.l;else break;}
      return label;
    }

    const kanaGroupsHira=[
      ['あ','い','う','え','お'],['か','き','く','け','こ'],['さ','し','す','せ','そ'],
      ['た','ち','つ','て','と'],['な','に','ぬ','ね','の'],['は','ひ','ふ','へ','ほ'],
      ['ま','み','む','め','も'],['や','（','ゆ','）','よ'],['ら','り','る','れ','ろ'],
      ['わ','を','ん','ー','　']
    ];
    const kanaGroupsKata=[
      ['ア','イ','ウ','エ','オ'],['カ','キ','ク','ケ','コ'],['サ','シ','ス','セ','ソ'],
      ['タ','チ','ツ','テ','ト'],['ナ','ニ','ヌ','ネ','ノ'],['ハ','ヒ','フ','ヘ','ホ'],
      ['マ','ミ','ム','メ','モ'],['ヤ','（','ユ','）','ヨ'],['ラ','リ','ル','レ','ロ'],
      ['ワ','ヲ','ン','ー','　']
    ];
    const transformMap={
      'か':'が','き':'ぎ','く':'ぐ','け':'げ','こ':'ご','さ':'ざ','し':'じ','す':'ず','せ':'ぜ','そ':'ぞ',
      'た':'だ','ち':'ぢ','つ':'づ','て':'で','と':'ど','は':'ば','ひ':'び','ふ':'ぶ','へ':'べ','ほ':'ぼ',
      'が':'か','ぎ':'き','ぐ':'く','げ':'け','ご':'こ','ざ':'さ','じ':'し','ず':'す','ぜ':'せ','ぞ':'そ',
      'だ':'た','ぢ':'ち','づ':'つ','で':'て','ど':'と',
      'ば':'ぱ','び':'ぴ','ぶ':'ぷ','べ':'ぺ','ぼ':'ぽ','ぱ':'は','ぴ':'ひ','ぷ':'ふ','ぺ':'へ','ぽ':'ほ',
      'あ':'ぁ','い':'ぃ','う':'ぅ','え':'ぇ','お':'ぉ','や':'ゃ','ゆ':'ゅ','よ':'ょ','わ':'ゎ',
      'ぁ':'あ','ぃ':'い','ぅ':'う','ぇ':'え','ぉ':'お','ゃ':'や','ゅ':'ゆ','ょ':'よ','っ':'つ','ゎ':'わ',
      'カ':'ガ','キ':'ギ','ク':'グ','ケ':'ゲ','コ':'ゴ','サ':'ザ','シ':'ジ','ス':'ズ','セ':'ゼ','ソ':'ゾ',
      'タ':'ダ','チ':'ヂ','ツ':'ヅ','テ':'デ','ト':'ド','ハ':'バ','ヒ':'ビ','フ':'ブ','ヘ':'ベ','ホ':'ボ',
      'ガ':'カ','ギ':'キ','グ':'ク','ゲ':'ケ','ゴ':'コ','ザ':'サ','ジ':'シ','ズ':'ス','ゼ':'セ','ゾ':'ソ',
      'ダ':'タ','ヂ':'チ','ヅ':'ツ','デ':'テ','ド':'ト',
      'バ':'パ','ビ':'ピ','ブ':'プ','ベ':'ペ','ボ':'ポ','パ':'ハ','ピ':'ヒ','プ':'フ','ペ':'ヘ','ポ':'ホ',
      'ア':'ァ','イ':'ィ','ウ':'ゥ','エ':'ェ','オ':'ォ','ヤ':'ャ','ユ':'ュ','ヨ':'ョ','ツ':'ッ','ワ':'ヮ',
      'ァ':'ア','ィ':'イ','ゥ':'ウ','ェ':'エ','ォ':'オ','ャ':'ヤ','ュ':'ユ','ョ':'ヨ','ッ':'ツ','ヮ':'ワ',
    };

    const JapaneseKeyboard = ({ value, onChange, onSet, isAddSub }) => {
      const [isKatakana, setIsKatakana] = useState(false);
      const [activeGroup, setActiveGroup] = useState(null);
      const groupsDisplay = isKatakana
        ? ["ア","カ","サ","タ","ナ","ハ","マ","ヤ","ラ","ワ"]
        : ["あ","か","さ","た","な","は","ま","や","ら","わ"];
      const kanaGroups = isKatakana ? kanaGroupsKata : kanaGroupsHira;

      const accent      = isAddSub ? '#3a8c52' : '#3a72a8';
      const accentSoft  = isAddSub ? 'rgba(58,140,82,0.12)'  : 'rgba(58,114,168,0.12)';
      const accentGrad  = isAddSub
        ? 'linear-gradient(135deg,#5aab6e,#3a8c52)'
        : 'linear-gradient(135deg,#5a90c8,#3a72a8)';
      const accentShadow = isAddSub
        ? '0 3px 12px rgba(58,140,82,0.28)'
        : '0 3px 12px rgba(58,114,168,0.28)';

      const handleChar = (char) => {
        if (char.trim()===""&&char!=="ー") return;
        if (value.length<8) onChange(value+char);
        setActiveGroup(null);
      };
      const handleTransform = () => {
        if (!value) return;
        const last=value.slice(-1), next=transformMap[last];
        if (next) onChange(value.slice(0,-1)+next);
      };
      const popBtn = {
        width:46,height:46,borderRadius:10,
        border:'1px solid rgba(0,0,0,0.10)',
        background:'white',fontSize:'1.1rem',
        fontWeight:900,color:'#3a2a00',cursor:'pointer'
      };
      const popBtnCenter = { ...popBtn, background:accentSoft, border:`2px solid ${accent}`, color:accent };

      return (
        <div style={{
          width:'100%', background:'rgba(255,255,255,0.55)',
          backdropFilter:'blur(14px)', WebkitBackdropFilter:'blur(14px)',
          borderRadius:20, padding:12,
          border:'2px solid rgba(255,255,255,0.72)',
          marginTop:10, position:'relative',
          boxShadow:'0 4px 20px rgba(0,0,0,0.08)'
        }}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
            {groupsDisplay.map((g,i)=>(
              <div key={i} style={{position:'relative'}}>
                <button
                  onPointerDown={(e)=>{e.preventDefault();setActiveGroup(activeGroup===i?null:i);}}
                  style={{
                    width:'100%',height:42,borderRadius:10,
                    border:activeGroup===i?`2px solid ${accent}`:'1px solid rgba(0,0,0,0.10)',
                    background:activeGroup===i?accentSoft:'rgba(255,255,255,0.82)',
                    fontSize:'1rem',fontWeight:900,color:'#3a2a00',
                    cursor:'pointer',boxShadow:'0 2px 5px rgba(0,0,0,0.06)'
                  }}>
                  {g}
                </button>
                {activeGroup===i&&(
                  <div style={{
                    position:'absolute',top:'50%',left:'50%',
                    transform:'translate(-50%,-50%)',
                    background:'rgba(255,255,255,0.98)',
                    padding:10,borderRadius:16,
                    display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,
                    border:`2px solid ${accent}`,zIndex:2000,
                    boxShadow:'0 8px 32px rgba(0,0,0,0.15)'
                  }}>
                    <div/>
                    <button onPointerDown={(e)=>{e.preventDefault();handleChar(kanaGroups[i][1]);}} style={popBtn}>{kanaGroups[i][1]}</button>
                    <div/>
                    <button onPointerDown={(e)=>{e.preventDefault();handleChar(kanaGroups[i][2]);}} style={popBtn}>{kanaGroups[i][2]}</button>
                    <button onPointerDown={(e)=>{e.preventDefault();handleChar(kanaGroups[i][0]);}} style={popBtnCenter}>{kanaGroups[i][0]}</button>
                    <button onPointerDown={(e)=>{e.preventDefault();handleChar(kanaGroups[i][3]);}} style={popBtn}>{kanaGroups[i][3]}</button>
                    <div/>
                    <button onPointerDown={(e)=>{e.preventDefault();handleChar(kanaGroups[i][4]);}} style={popBtn}>{kanaGroups[i][4]}</button>
                    <div/>
                  </div>
                )}
              </div>
            ))}
            {[
              {label:'あ/ア',action:()=>setIsKatakana(!isKatakana)},
              {label:'゛゜小',action:handleTransform},
              {label:'⌫',    action:()=>onChange(value.slice(0,-1))},
              {label:'OK',   action:onSet,highlight:true}
            ].map((btn,i)=>(
              <button key={i}
                onPointerDown={(e)=>{e.preventDefault();btn.action();}}
                style={{
                  height:42,borderRadius:10,
                  border:btn.highlight?'none':'1px solid rgba(0,0,0,0.10)',
                  background:btn.highlight?accentGrad:'rgba(255,255,255,0.72)',
                  color:btn.highlight?'white':'#3a2a00',
                  fontSize:btn.label==='⌫'?'1.2rem':'0.85rem',
                  fontWeight:900,cursor:'pointer',
                  boxShadow:btn.highlight?accentShadow:'0 2px 5px rgba(0,0,0,0.06)'
                }}>
                {btn.label}
              </button>
            ))}
          </div>
        </div>
      );
    };

    const ToggleButton = ({ options, value, onChange }) => {
      const idx = options.findIndex(o=>o.v===value);
      const opt = options[idx>=0?idx:0];
      return (
        <button
          onPointerDown={(e)=>{e.preventDefault();playClick();onChange(options[(idx+1)%options.length].v);}}
          className="toggle-btn">
          <span className="toggle-arrow">‹</span>
          <div className="toggle-content">
            {opt.e&&<span className="toggle-emoji">{opt.e}</span>}
            <span className="toggle-label">{opt.l}</span>
          </div>
          <span className="toggle-arrow">›</span>
        </button>
      );
    };

    const GlobalMenu = ({ screen, setScreen }) => {
      const [open,setOpen]=useState(false);
      const isDuo  =screen.startsWith("duo");
      const isPlay =screen.includes("game")||screen.includes("countdown");
      const isSetup=screen.includes("setup")||screen==="solo-menu";
      const handle=(to)=>{setOpen(false);setScreen(to);};
      const toggleFullscreen=()=>{
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        else document.exitFullscreen();
        setOpen(false);
      };
      const containerStyle=(isDuo&&(isPlay||isSetup))
        ?{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",zIndex:6000}
        :{position:"fixed",top:12,right:12,zIndex:6000};
      return (
        <div style={containerStyle}>
          {open&&<div onPointerDown={()=>setOpen(false)} style={{position:"fixed",inset:0,zIndex:5999}}/>}
          <button onPointerDown={(e)=>{e.preventDefault();playClick();setOpen(!open);}} className="menu-ham-btn">
            <div className="ham-line"/><div className="ham-line"/><div className="ham-line"/>
          </button>
          {open&&(
            <div className="menu-dropdown" style={(isDuo&&(isPlay||isSetup))?{bottom:55,right:0}:{top:55,right:0}}>
              <div onPointerDown={()=>setOpen(false)} className="menu-item">🎮 ゲームにもどる</div>
              <div onPointerDown={toggleFullscreen}   className="menu-item">📺 全画面の切り替え</div>
              {screen!=="top"&&<div onPointerDown={()=>handle(isDuo?"duo-setup":"solo-menu")} className="menu-item">📝 モード選択へ</div>}
              <div onPointerDown={()=>{stopBGM();handle("top");}} className="menu-item menu-item-danger">🏠 タイトルへ</div>
            </div>
          )}
        </div>
      );
    };

    const DigitKeypad = ({ onAnswer, typed, isMini }) => {
      const size=isMini?46:58, fs=isMini?'1.5rem':'1.9rem';
      return (
        <div className="digit-row-container" style={{gap:isMini?10:16}}>
          {[[1,2,3,4,5],[6,7,8,9,0]].map((row,ri)=>(
            <div key={ri} className="digit-row" style={{gap:isMini?8:10}}>
              {row.map(d=>(
                <button key={d}
                  onPointerDown={(e)=>{e.preventDefault();playDigit();onAnswer(typed+d);}}
                  className="digit-button" style={{width:size,height:size,fontSize:fs}}>
                  {d}
                </button>
              ))}
            </div>
          ))}
        </div>
      );
    };

    const GamePanel = ({ isMini, feedback, current, onAnswer, typed }) => {
      if (!current) return null;
      const parts=current.question.split("?");
      return (
        <div className="game-panel">
          <div className={`q-box ${feedback||""}`}
            style={{padding:isMini?"14px 18px":"22px 28px",marginBottom:isMini?"14px":"28px"}}>
            <div className="q-text" style={{fontSize:isMini?"1.9rem":"2.5rem"}}>
              {parts[0]}
              <span className="ans-slot" style={{
                color:
                  feedback==="correct"?"#2d7a3a":
                  feedback==="wrong"  ?"#b83232":
                  typed               ?"#c05a10":
                  "rgba(70,45,0,0.28)",
                borderColor:
                  feedback==="correct"?"#2d7a3a":
                  feedback==="wrong"  ?"#b83232":
                  typed               ?"#c05a10":
                  "rgba(70,45,0,0.22)"
              }}>
                {typed||(feedback==="correct"?current.answer:"?")}
              </span>
              {parts[1]}
            </div>
            {feedback&&(
              <div className="feedback-container">
                <div className={`fb-icon ${feedback==="correct"?"fb-pop":"fb-shake"}`}>
                  {feedback==="correct"?"✓":"✕"}
                </div>
              </div>
            )}
          </div>
          <DigitKeypad onAnswer={onAnswer} typed={typed} isMini={isMini}/>
        </div>
      );
    };

    const Confetti = () => {
      const pieces=useRef([...Array(55)].map((_,i)=>{
        const colors=['#f8a4c8','#f9b87a','#f5d87a','#7ec48a','#7ab4d8','#b09de0','#a8d87a','#f4907a'];
        const dur=3.5+Math.random()*4;
        return {
          id:i, x:Math.random()*100, size:7+Math.random()*8,
          color:colors[i%colors.length],
          delay:-Math.random()*dur, duration:dur,
          rotate:Math.random()*360, shape:Math.random()>0.5?'50%':'3px'
        };
      })).current;
      return (
        <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:900,overflow:'hidden'}}>
          {pieces.map(p=>(
            <div key={p.id} className="confetti" style={{
              left:p.x+'%',width:p.size,height:p.size,
              backgroundColor:p.color,borderRadius:p.shape,
              animationDelay:p.delay+'s',animationDuration:p.duration+'s',
              transform:`rotate(${p.rotate}deg)`
            }}/>
          ))}
        </div>
      );
    };

    const TimerRing = ({ time, max, isAddSub }) => {
      const r=36, circ=2*Math.PI*r, pct=time/max;
      const color=pct>0.5?(isAddSub?'#3a8c52':'#3a72a8'):pct>0.25?'#c08a20':'#b84040';
      return (
        <div style={{position:'relative',width:90,height:90,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="90" height="90" style={{position:'absolute',transform:'rotate(-90deg)'}}>
            <circle cx="45" cy="45" r={r} fill="none" stroke="rgba(0,0,0,0.07)" strokeWidth="7"/>
            <circle cx="45" cy="45" r={r} fill="none" stroke={color} strokeWidth="7"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
              style={{transition:'stroke-dashoffset 0.9s linear,stroke 0.5s'}} strokeLinecap="round"/>
          </svg>
          <span style={{color,fontSize:'1.8rem',fontWeight:900,zIndex:1,transition:'color 0.5s'}}>{time}</span>
        </div>
      );
    };

    function App() {
      const [mainMode,   setMainMode]   = useState("addSub");
      const [screen,     setScreen]     = useState("top");
      const [soundOn,    setSoundOn]    = useState(true);
      const [soloLevel,  setSoloLevel]  = useState(1);
      const [soloOp,     setSoloOp]     = useState("add");
      const [soloScore,  setSoloScore]  = useState(0);
      const [soloTime,   setSoloTime]   = useState(0);
      const [soloFinish, setSoloFinish] = useState(false);
      const [soloName,   setSoloName]   = useState("プレイヤー1");
      const [countdown,  setCountdown]  = useState(3);
      const [q1,  setQ1]  = useState(null);
      const [fb1, setFb1] = useState(null);
      const [typed1, setTyped1] = useState("");
      const [p1Name,  setP1Name]  = useState("プレイヤー1");
      const [p2Name,  setP2Name]  = useState("プレイヤー2");
      const [p1Level, setP1Level] = useState(1);
      const [p2Level, setP2Level] = useState(1);
      const [p1Op,    setP1Op]    = useState("add");
      const [p2Op,    setP2Op]    = useState("add");
      const [p1Score, setP1Score] = useState(0);
      const [p2Score, setP2Score] = useState(0);
      const [duoGoal, setDuoGoal] = useState(10);
      const [winner,  setWinner]  = useState(null);
      const [q2,  setQ2]  = useState(null);
      const [fb2, setFb2] = useState(null);
      const [typed2, setTyped2] = useState("");
      const [p1Ready,setP1Ready] = useState(false);
      const [p2Ready,setP2Ready] = useState(false);
      const [soloKb, setSoloKb] = useState(false);
      const [p1Kb,   setP1Kb]   = useState(false);
      const [p2Kb,   setP2Kb]   = useState(false);
      const touchStartX   = useRef(0);
      const finalScoreRef = useRef(0);

      const isAddSub = mainMode === "addSub";

      // ─── カラーパレット（落ち着いた色味）───
      const palette = isAddSub ? {
        // 緑系：深みのある柔らかいグリーン
        bgGrad:      'linear-gradient(145deg, #e8f5e8 0%, #c8e8c8 35%, #a8d4a8 65%, #88c088 100%)',
        accent:      '#3a8c52',
        accentDark:  '#2d6e40',
        accentGrad:  'linear-gradient(135deg,#5aab6e,#3a8c52)',
        accentShadow:'rgba(58,140,82,0.28)',
        cardBg:      'rgba(255,255,255,0.52)',
        cardBorder:  'rgba(255,255,255,0.75)',
        particle:    'rgba(88,160,88,0.22)',
        headerBg:    'rgba(255,255,255,0.42)',
      } : {
        // 青系：穏やかなスカイブルー
        bgGrad:      'linear-gradient(145deg, #e8f0fa 0%, #c8d8f0 35%, #a8c0e8 65%, #88a8d8 100%)',
        accent:      '#3a72a8',
        accentDark:  '#2d5880',
        accentGrad:  'linear-gradient(135deg,#5a90c8,#3a72a8)',
        accentShadow:'rgba(58,114,168,0.28)',
        cardBg:      'rgba(255,255,255,0.52)',
        cardBorder:  'rgba(255,255,255,0.75)',
        particle:    'rgba(88,130,200,0.22)',
        headerBg:    'rgba(255,255,255,0.42)',
      };

      const glassCard = {
        background:          palette.cardBg,
        backdropFilter:      'blur(20px)',
        WebkitBackdropFilter:'blur(20px)',
        border:              `2px solid ${palette.cardBorder}`,
        borderRadius:        28,
        boxShadow:           '0 8px 32px rgba(0,0,0,0.10)',
      };

      const toggleMainMode = () => { playClick(); setMainMode(p=>p==="addSub"?"mulDiv":"addSub"); };

      // ─── サウンド制御 ───
      useEffect(()=>{
        isSoundEnabled=soundOn;
        if (!soundOn) { stopBGM(); return; }
        const t=getBGMType(screen);
        if (t) playBGM(t,true);
      },[soundOn]);

      useEffect(()=>{
        if (!soundOn) return;
        const t=getBGMType(screen);
        if (t) playBGM(t); else stopBGM();
      },[screen]);

      useEffect(()=>{
        const fn=()=>{
          if (document.hidden) { stopBGM(); return; }
          if (soundOn) { const t=getBGMType(screen); if(t) playBGM(t,true); }
        };
        document.addEventListener("visibilitychange",fn);
        return ()=>document.removeEventListener("visibilitychange",fn);
      },[soundOn,screen]);

      useEffect(()=>{
        const op=isAddSub?"add":"mul";
        setSoloOp(op); setP1Op(op); setP2Op(op);
      },[mainMode]);

      useEffect(()=>{
        if (screen==="duo-setup"&&p1Ready&&p2Ready) {
          const t=setTimeout(()=>startDuo(),500);
          return ()=>clearTimeout(t);
        }
      },[p1Ready,p2Ready]);

      // ─── タイマー ───
      useEffect(()=>{
        let itv;
        if ((screen==="solo-game-time"||screen==="solo-game-death")&&!soloFinish) {
          itv=setInterval(()=>{
            setSoloTime(p=>{
              if (p<=1) {
                stopBGM(); setSoloFinish(true);
                setTimeout(()=>setScreen(
                  screen==="solo-game-time"?"result-solo-time":"result-solo-death"
                ),1000);
                return 0;
              }
              if (p<=3) playTimeWarn();
              return p-1;
            });
          },1000);
        }
        return ()=>clearInterval(itv);
      },[screen,soloFinish]);

      // ─── スタート処理 ───
      const startSoloTime = () => {
        finalScoreRef.current=0;
        setSoloScore(0); setTyped1(""); setFb1(null);
        setSoloTime(TIME_LIMIT_30); setSoloFinish(false);
        setCountdown(3); setScreen("solo-countdown-time");
        let c=3; playCountdown(c);
        const t=setInterval(()=>{
          c--;
          if (c<=0) { clearInterval(t); playCountdown(0); setQ1(generateQuestion(soloLevel,soloOp,mainMode)); setScreen("solo-game-time"); }
          else { setCountdown(c); playCountdown(c); }
        },1000);
      };

      const startSoloDeath = () => {
        finalScoreRef.current=0;
        setSoloScore(0); setTyped1(""); setFb1(null);
        setSoloTime(SUDDEN_DEATH_PER_Q); setSoloFinish(false);
        setCountdown(3); setScreen("solo-countdown-death");
        let c=3; playCountdown(c);
        const t=setInterval(()=>{
          c--;
          if (c<=0) { clearInterval(t); playCountdown(0); setQ1(generateQuestion(1,isAddSub?"add":"mul",mainMode)); setScreen("solo-game-death"); }
          else { setCountdown(c); playCountdown(c); }
        },1000);
      };

      const startDuo = () => {
        setWinner(null); setP1Score(0); setP2Score(0);
        setTyped1(""); setTyped2(""); setFb1(null); setFb2(null);
        setP1Ready(false); setP2Ready(false);
        setQ1(generateQuestion(p1Level,p1Op,mainMode));
        setQ2(generateQuestion(p2Level,p2Op,mainMode));
        setCountdown(3); setScreen("duo-countdown");
        let c=3; playCountdown(c);
        const t=setInterval(()=>{
          c--;
          if (c<=0) { clearInterval(t); playCountdown(0); setScreen("duo-game"); }
          else { setCountdown(c); playCountdown(c); }
        },1000);
      };

      // ─── 回答ハンドラ ───
      const handleSoloAnsTime = (v) => {
        if (fb1||soloFinish||!q1) return;
        setTyped1(v);
        if (v===String(q1.answer)) {
          playCorrect(); setFb1("correct");
          setSoloScore(s=>{ finalScoreRef.current=s+1; return s+1; });
          setTimeout(()=>{ setFb1(null); setTyped1(""); setQ1(q=>generateQuestion(soloLevel,soloOp,mainMode,q.question)); },250);
        } else if (!String(q1.answer).startsWith(v)) {
          playWrong(); setFb1("wrong");
          setTimeout(()=>{ setFb1(null); setTyped1(""); },400);
        }
      };

      const handleSoloAnsDeath = (v) => {
        if (fb1||soloFinish||!q1) return;
        setTyped1(v);
        if (v===String(q1.answer)) {
          playCorrect(); setFb1("correct");
          setSoloScore(s=>{ finalScoreRef.current=s+1; return s+1; });
          setTimeout(()=>{
            setFb1(null); setTyped1(""); setSoloTime(SUDDEN_DEATH_PER_Q);
            setQ1(q=>generateQuestion(
              Math.min(4,Math.floor(finalScoreRef.current/10)+1),
              isAddSub?"add":"mul",mainMode,q.question
            ));
          },250);
        } else if (!String(q1.answer).startsWith(v)) {
          playWrong(); setFb1("wrong"); setSoloFinish(true); stopBGM();
          setTimeout(()=>setScreen("result-solo-death"),1000);
        }
      };

      const handleDuoAns = (p,v) => {
        if (winner||screen!=="duo-game") return;
        const target=p===1?q1:q2;
        const setT=p===1?setTyped1:setTyped2;
        const setS=p===1?setP1Score:setP2Score;
        const setFb=p===1?setFb1:setFb2;
        const cur=p===1?p1Score:p2Score;
        setT(v);
        if (v===String(target.answer)) {
          playCorrect(); setFb("correct");
          const ns=cur+1; setS(ns);
          if (ns>=duoGoal) {
            setWinner(p===1?p1Name:p2Name); stopBGM(); playWin();
            setTimeout(()=>setScreen("duo-result"),1500);
          } else {
            setTimeout(()=>{
              setFb(null); setT("");
              (p===1?setQ1:setQ2)(q=>generateQuestion(
                p===1?p1Level:p2Level,p===1?p1Op:p2Op,mainMode,q.question
              ));
            },300);
          }
        } else if (!String(target.answer).startsWith(v)) {
          playWrong(); setFb("wrong");
          setS(s=>Math.max(0,s-1));
          setTimeout(()=>{ setFb(null); setT(""); },400);
        }
      };

      const goTop = () => {
        stopBGM(); setScreen("top");
        setSoloLevel(1); setDuoGoal(10);
        setSoloKb(false); setP1Kb(false); setP2Kb(false);
        setP1Ready(false); setP2Ready(false); setWinner(null);
      };

      const opOptions = isAddSub
        ? [
            {v:"both",e:<span className="op-group"><span className="op-add">＋</span><span className="op-sub">－</span></span>,l:"りょうほう"},
            {v:"add", e:<span className="op-add">＋</span>,l:"たし算"},
            {v:"sub", e:<span className="op-sub">－</span>,l:"ひき算"}
          ]
        : [
            {v:"both",e:<span className="op-group"><span className="op-mul">×</span><span className="op-div">÷</span></span>,l:"りょうほう"},
            {v:"mul", e:<span className="op-mul">×</span>,l:"かけ算"},
            {v:"div", e:<span className="op-div">÷</span>,l:"わり算"}

      const lvOptions = isAddSub
        ? [
            {v:1,e:"⭐",       l:"10をつくる"},
            {v:2,e:"⭐⭐",     l:"くり上がり"},
            {v:3,e:"⭐⭐⭐",   l:"2ケタ計算"},
            {v:4,e:"⭐⭐⭐⭐", l:"むずかしい"}
          ]
        : [
            {v:1,e:"⭐",       l:"１～５の段"},
            {v:2,e:"⭐⭐",     l:"１～９の段"},
            {v:3,e:"⭐⭐⭐",   l:"２ケタの段"},
            {v:4,e:"⭐⭐⭐⭐", l:"むずかしい"}

      const isDuo   = screen.startsWith("duo");
      const isPlay  = screen.includes("game")||screen.includes("countdown");
      const isSetup = screen.includes("setup")||screen==="solo-menu";

      const soundBtnStyle=(isDuo&&(isPlay||isSetup))
        ?{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",zIndex:6000}
        :{position:"fixed",top:12,left:12,zIndex:6000};

              background:rgba(255,255,255,0.32);
              transition:background 0.2s;
              letter-spacing:0.03em;
            }
            .swipe-hint-text:active { background:rgba(255,255,255,0.58); }

            /* ─── カウントダウン ─── */
            .countdown-num {
              font-size:9rem; font-weight:900; color:#2a3a2a;
              text-shadow:0 4px 20px rgba(255,255,255,0.7);
              animation:cPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
            }

            /* ─── 紙吹雪 ─── */
            @keyframes confetti-fall {
              0%   { transform:translateY(-5vh) rotate(0deg);    opacity:1; }
              100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
            }
            .confetti { position:absolute; animation:confetti-fall linear infinite; }

            /* ─── ソロゲーム ヘッダー ─── */
            .solo-header {
              position:absolute; top:0; width:100%;
              background:rgba(255,255,255,0.42); backdrop-filter:blur(12px);
              border-bottom:2px solid rgba(255,255,255,0.68);
              padding:10px 16px;
              display:flex; align-items:center; justify-content:space-between;
              z-index:20;
            }
            .solo-header-label {
              color:#2a3a2a; font-weight:900; font-size:0.9rem;
            }
            .solo-score-badge {
              border-radius:20px; padding:4px 14px;
              font-weight:900; font-size:1rem; color:white;
            }

            /* ─── リザルト画面 ─── */
            .result-score {
              font-size:4.5rem; font-weight:900; color:#2a3a2a;
              text-shadow:0 2px 8px rgba(255,255,255,0.6);
            }
            .result-label {
              font-size:0.95rem; color:rgba(50,45,0,0.52);
              font-weight:800; margin-top:-4px;
            }

            /* ─── キーフレーム ─── */
            @keyframes cPop {
              0%  { transform:scale(0.6); }
              60% { transform:scale(1.25); }
              100%{ transform:scale(1); }
            }
            @keyframes wShake {
              0%,100%{ transform:translateX(0); }
              25%    { transform:translateX(-7px); }
              75%    { transform:translateX(7px); }
            }
          `}</style>

          {/* ─── 背景パーティクル ─── */}
          {[...Array(8)].map((_,i)=>(
            <div key={i} className="particle" style={{
              width:  40+i*15,
              height: 40+i*15,
              top:    (i*12+5)+'%',
              left:   (i%2?2:87)+'%',
              background: palette.particle,
              animationDelay:    i*0.7+'s',
              animationDuration: (5+i*0.5)+'s'
            }}/>
          ))}

          {/* ─── サウンドボタン ─── */}
          <div style={soundBtnStyle}>
            <button className="se-toggle-btn"
              onPointerDown={()=>{ playClick(); setSoundOn(!soundOn); }}>
              {soundOn?"🎵":"🔇"}
            </button>
          </div>

          <GlobalMenu screen={screen} setScreen={setScreen}/>

          {/* ════════════════════════════════
              トップ画面
          ════════════════════════════════ */}
          {screen==="top" && (
            <div style={{textAlign:"center",zIndex:10,display:"flex",flexDirection:"column",alignItems:"center"}}>
              {/* ★修正: opacityを固定（半透明にしない） */}
              <div style={{
                fontSize:"5.5rem",
                animation:"particle-float 3s ease-in-out infinite",
                marginBottom:8,
                opacity:1
              }}>
                {isAddSub?"🐻":"🐼"}
              </div>
              <h1 className="title-main">
                {/* ★修正: 記号を後ろに配置 */}
                {isAddSub
                  ? <>たし算<span className="op-add" style={{fontSize:'4.2rem'}}>＋</span><br/>ひき算<span className="op-sub" style={{fontSize:'4.2rem'}}>－</span></>
                  : <>かけ算<span className="op-mul" style={{fontSize:'4.2rem'}}>×</span><br/>わり算<span className="op-div" style={{fontSize:'4.2rem'}}>÷</span></>}
              </h1>
              <p className="title-sub">MATH CHALLENGE</p>

              <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:36}}>
                {[
                  {icon:"🐥",label:"ひとりで",to:"solo-menu"},
                  {icon:isAddSub?"🐻🐹":"🐼🦊",label:"ふたりで",to:"duo-setup"}
                ].map(btn=>(
                  <div key={btn.to} className="mode-card clickable"
                    style={{padding:"22px 28px",minWidth:130}}
                    onPointerDown={()=>{ playClick(); setScreen(btn.to); }}>
                    <div style={{fontSize:"3rem"}}>{btn.icon}</div>
                    <div className="mode-card-label">{btn.label}</div>
                  </div>
                ))}
              </div>

              <div className="swipe-hint-text"
                onPointerDown={(e)=>{ e.preventDefault(); toggleMainMode(); }}>
                ‹ スワイプまたはタップで切り替え ›
              </div>
            </div>
          )}

          {/* ════════════════════════════════
              ソロ メニュー
          ════════════════════════════════ */}
          {screen==="solo-menu" && (
            <div style={{textAlign:"center",zIndex:10}}>
              <h2 style={{color:"#2a3a2a",fontSize:"1.8rem",marginBottom:28,fontWeight:900,
                textShadow:"0 2px 8px rgba(255,255,255,0.6)"}}>
                どちらであそぶ？
              </h2>
              <div style={{display:"flex",gap:16,justifyContent:"center"}}>
                {[
                  {icon:"⏱️",label:"30秒モード",sub:"はやおしチャレンジ",to:"solo-setup-time"},
                  {icon:"🚀",label:"サドンデス", sub:"ミスしたら終わり",  to:"solo-setup-death"}
                ].map(m=>(
                  <div key={m.to} className="mode-card clickable"
                    style={{padding:"22px 20px",minWidth:140}}
                    onPointerDown={()=>{ playClick(); setScreen(m.to); }}>
                    <div style={{fontSize:"3rem"}}>{m.icon}</div>
                    <div className="mode-card-label">{m.label}</div>
                    <div style={{color:"rgba(40,50,0,0.42)",fontSize:"0.75rem",marginTop:4,fontWeight:700}}>
                      {m.sub}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ════════════════════════════════
              ソロ セットアップ
          ════════════════════════════════ */}
          {screen.includes("solo-setup") && (
            <div style={{...glassCard,maxWidth:420,width:"95%",zIndex:10,padding:"28px 24px"}}>
              <h2 style={{color:"#2a3a2a",marginBottom:20,fontWeight:900,fontSize:"1.3rem",textAlign:"center"}}>
                {screen.includes("time")?"⏱️ 30秒モード":"🚀 サドンデス"}
              </h2>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div className="input-box-container"
                  onPointerDown={()=>{ if(!soloKb&&soloName==="プレイヤー1") setSoloName(""); setSoloKb(!soloKb); }}>
                  <span className="input-icon">🐥</span>
                  <div className="input-val">{soloName||"　"}</div>
                  <span className="input-pencil">✏️</span>
                </div>
                {soloKb
                  ? <JapaneseKeyboard value={soloName} onChange={setSoloName} isAddSub={isAddSub}
                      onSet={()=>{ if(!soloName.trim()) setSoloName("プレイヤー1"); setSoloKb(false); }}/>
                  : <>
                      <div style={{display:"flex",gap:8,width:"100%"}}>
                        <ToggleButton options={opOptions} value={soloOp} onChange={setSoloOp}/>
                        <ToggleButton options={lvOptions} value={soloLevel} onChange={setSoloLevel}/>
                      </div>
                      <button className="start-btn"
                        style={{
                          marginTop:6,width:"100%",
                          background:palette.accentGrad,
                          boxShadow:`0 4px 20px ${palette.accentShadow}`
                        }}
                        onPointerDown={screen.includes("time")?startSoloTime:startSoloDeath}>
                        スタート！
                      </button>
                    </>
                }
              </div>
            </div>
          )}

          {/* ════════════════════════════════
              対戦 セットアップ
          ════════════════════════════════ */}
          {screen==="duo-setup" && (
            <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",zIndex:50}}>

              {/* P2エリア（上・回転） */}
              <div style={{flex:1,transform:"rotate(180deg)",display:"flex",alignItems:"center",
                justifyContent:"center",background:"rgba(255,255,255,0.08)",padding:12}}>
                <div style={{...glassCard,width:"100%",maxWidth:460,padding:"16px 18px"}}>
                  <div className="input-box-container" style={{marginBottom:10}}
                    onPointerDown={()=>{ if(!p2Kb&&p2Name==="プレイヤー2") setP2Name(""); setP2Kb(!p2Kb); }}>
                    <span className="input-icon">{isAddSub?"🐹":"🦊"}</span>
                    <div className="input-val">{p2Name||"　"}</div>
                    <span className="input-pencil">✏️</span>
                  </div>
                  {p2Kb
                    ? <JapaneseKeyboard value={p2Name} onChange={setP2Name} isAddSub={isAddSub}
                        onSet={()=>{ if(!p2Name.trim()) setP2Name("プレイヤー2"); setP2Kb(false); }}/>
                    : <>
                        <div style={{display:"flex",gap:8}}>
                          <ToggleButton options={opOptions} value={p2Op} onChange={setP2Op}/>
                          <ToggleButton options={lvOptions} value={p2Level} onChange={setP2Level}/>
                        </div>
                        <button className={`status-btn ${p2Ready?"wait":"ready"}`}
                          onPointerDown={()=>{ playClick(); setP2Ready(!p2Ready); }}>
                          {p2Ready?"⏳ まってね…":"✓ けってい！"}
                        </button>
                      </>
                  }
                </div>
              </div>

              {/* 中央バー */}
              <div style={{
                height:58,width:"100%",
                background:"rgba(255,255,255,0.32)",
                backdropFilter:"blur(12px)",
                borderTop:"2px solid rgba(255,255,255,0.68)",
                borderBottom:"2px solid rgba(255,255,255,0.68)",
                display:"flex",alignItems:"center",justifyContent:"center",gap:16,zIndex:100
              }}>
                <span style={{color:"rgba(40,50,0,0.52)",fontSize:"0.85rem",fontWeight:800}}>目標</span>
                <div style={{width:180}}>
                  <ToggleButton
                    options={[{v:5,l:"5もん"},{v:10,l:"10もん"},{v:20,l:"20もん"}]}
                    value={duoGoal} onChange={setDuoGoal}/>
                </div>
              </div>

              {/* P1エリア（下） */}
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",
                background:"rgba(255,255,255,0.08)",padding:12}}>
                <div style={{...glassCard,width:"100%",maxWidth:460,padding:"16px 18px"}}>
                  <div className="input-box-container" style={{marginBottom:10}}
                    onPointerDown={()=>{ if(!p1Kb&&p1Name==="プレイヤー1") setP1Name(""); setP1Kb(!p1Kb); }}>
                    <span className="input-icon">{isAddSub?"🐻":"🐼"}</span>
                    <div className="input-val">{p1Name||"　"}</div>
                    <span className="input-pencil">✏️</span>
                  </div>
                  {p1Kb
                    ? <JapaneseKeyboard value={p1Name} onChange={setP1Name} isAddSub={isAddSub}
                        onSet={()=>{ if(!p1Name.trim()) setP1Name("プレイヤー1"); setP1Kb(false); }}/>
                    : <>
                        <div style={{display:"flex",gap:8}}>
                          <ToggleButton options={opOptions} value={p1Op} onChange={setP1Op}/>
                          <ToggleButton options={lvOptions} value={p1Level} onChange={setP1Level}/>
                        </div>
                        <button className={`status-btn ${p1Ready?"wait":"ready"}`}
                          onPointerDown={()=>{ playClick(); setP1Ready(!p1Ready); }}>
                          {p1Ready?"⏳ まってね…":"✓ けってい！"}
                        </button>
                      </>
                  }
                </div>
              </div>
            </div>
          )}

          {/* ════════════════════════════════
              カウントダウン（ソロ）
          ════════════════════════════════ */}
          {screen.includes("solo-countdown") && (
            <div style={{zIndex:100,textAlign:"center"}}>
              <p style={{color:"#2a3a2a",fontSize:"1.8rem",fontWeight:900,marginBottom:8,
                textShadow:"0 2px 8px rgba(255,255,255,0.6)"}}>
                よーい…
              </p>
              <div className="countdown-num" key={countdown}>{countdown}</div>
            </div>
          )}

          {/* ════════════════════════════════
              ソロ ゲーム
          ════════════════════════════════ */}
          {screen.includes("solo-game") && (
            <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",position:"relative"}}>

              <div className="solo-header">
                <div className="solo-header-label">
                  {screen.includes("death")
                    ? `🚀 ステージ ${Math.min(4,Math.floor(finalScoreRef.current/10)+1)}`
                    : `🎖️ ${getRankLabel(soloScore)}`}
                </div>
                <div className="solo-score-badge"
                  style={{
                    background:palette.accentGrad,
                    boxShadow:`0 3px 12px ${palette.accentShadow}`
                  }}>
                  ✓ {soloScore}
                </div>
                <TimerRing
                  time={soloTime}
                  max={screen.includes("time")?TIME_LIMIT_30:SUDDEN_DEATH_PER_Q}
                  isAddSub={isAddSub}/>
              </div>

              <GamePanel
                feedback={fb1} current={q1}
                onAnswer={screen.includes("time")?handleSoloAnsTime:handleSoloAnsDeath}
                score={soloScore} typed={typed1}/>

              {soloFinish && (
                <div className="result-overlay">
                  <div className="result-band"
                    style={{background:"rgba(255,255,255,0.72)",color:"#2a3a2a"}}>
                    そこまで！
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ════════════════════════════════
              対戦 カウントダウン & ゲーム
          ════════════════════════════════ */}
          {(screen==="duo-game"||screen==="duo-countdown") && (
            <div style={{flex:1,width:"100%",display:"flex",flexDirection:"column",zIndex:10}}>

              {/* P2エリア（上・回転） */}
              <div style={{transform:"rotate(180deg)",flex:1,display:"flex",flexDirection:"column"}}>
                <div style={{
                  textAlign:"center",color:"#2a3a2a",fontWeight:900,
                  padding:"6px 0",fontSize:"0.9rem",
                  background:"rgba(255,255,255,0.22)",
                  borderBottom:"2px solid rgba(255,255,255,0.48)"
                }}>
                  {isAddSub?"🐹":"🦊"}&nbsp;{p2Name}
                  <span style={{marginLeft:10,fontWeight:900,fontSize:"0.9rem",color:palette.accentDark}}>
                    {p2Score}点
                  </span>
                </div>
                <div style={{flex:1,display:"flex",alignItems:"center",
                  justifyContent:"center",position:"relative"}}>
                  {screen==="duo-countdown"
                    ? <div className="countdown-num" key={"p2-"+countdown}>{countdown}</div>
                    : <GamePanel isMini current={q2} feedback={fb2}
                        onAnswer={v=>handleDuoAns(2,v)} score={p2Score} typed={typed2}/>
                  }
                  {winner && (
                    <div className="result-overlay">
                      <div className="result-band" style={{
                        background:winner===p2Name?"rgba(255,255,255,0.78)":"rgba(255,255,255,0.52)",
                        color:winner===p2Name?palette.accentDark:"rgba(50,45,0,0.48)"
                      }}>
                        {winner===p2Name?"🎉 クリア！！":"🏳️ そこまで…"}
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* レーストラック */}
              <div className="race-track">
                <div className="race-label"
                  style={{left:65,background:"rgba(210,175,40,0.88)",color:"#5a3800"}}>
                  START
                </div>
                <div className="race-label"
                  style={{right:65,background:"rgba(184,60,60,0.88)",color:"white"}}>
                  GOAL!
                </div>
                <div style={{position:"absolute",left:140,right:140,top:0,bottom:0}}>
                  {[...Array(duoGoal+1)].map((_,i)=>(
                    <div key={i} style={{
                      position:"absolute",height:"100%",width:1,
                      background:"rgba(255,255,255,0.32)",
                      left:`${(i/duoGoal)*100}%`
                    }}/>
                  ))}
                  <div className="race-icon" style={{
                    left:`${(p2Score/duoGoal)*100}%`,
                    top:"3%",transform:"translateX(-50%) rotate(180deg)"
                  }}>
                    {isAddSub?"🐹":"🦊"}
                  </div>
                  <div className="race-icon" style={{
                    left:`${(p1Score/duoGoal)*100}%`,
                    top:"48%",transform:"translateX(-50%)"
                  }}>
                    {isAddSub?"🐻":"🐼"}
                  </div>
                </div>
              </div>

              {/* P1エリア（下） */}
              <div style={{flex:1,display:"flex",flexDirection:"column"}}>
                <div style={{
                  textAlign:"center",color:"#2a3a2a",fontWeight:900,
                  padding:"6px 0",fontSize:"0.9rem",
                  background:"rgba(255,255,255,0.18)",
                  borderTop:"2px solid rgba(255,255,255,0.48)"
                }}>
                  {isAddSub?"🐻":"🐼"}&nbsp;{p1Name}
                  <span style={{marginLeft:10,fontWeight:900,fontSize:"0.9rem",color:palette.accentDark}}>
                    {p1Score}点
                  </span>
                </div>
                <div style={{flex:1,display:"flex",alignItems:"center",
                  justifyContent:"center",position:"relative"}}>
                  {screen==="duo-countdown"
                    ? <div className="countdown-num" key={"p1-"+countdown}>{countdown}</div>
                    : <GamePanel isMini current={q1} feedback={fb1}
                        onAnswer={v=>handleDuoAns(1,v)} score={p1Score} typed={typed1}/>
                  }
                  {winner && (
                    <div className="result-overlay">
                      <div className="result-band" style={{
                        background:winner===p1Name?"rgba(255,255,255,0.78)":"rgba(255,255,255,0.52)",
                        color:winner===p1Name?palette.accentDark:"rgba(50,45,0,0.48)"
                      }}>
                        {winner===p1Name?"🎉 クリア！！":"🏳️ そこまで…"}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ════════════════════════════════
              リザルト
          ════════════════════════════════ */}
          {screen.includes("result") && (
            <>
              <Confetti/>
              <div style={{
                ...glassCard,
                width:"92%",maxWidth:400,
                zIndex:1000,animation:"cPop 0.4s",
                padding:"36px 28px",textAlign:"center"
              }}>
                <div style={{fontSize:"4.5rem",marginBottom:8}}>🏆</div>
                <h2 style={{color:"#2a3a2a",fontSize:"1.6rem",fontWeight:900,marginBottom:20}}>
                  結果発表
                </h2>

                {screen.includes("solo")
                  ? <>
                      <div className="result-score">{finalScoreRef.current}</div>
                      <div className="result-label">もん せいかい</div>
                      <div style={{color:"rgba(40,50,0,0.52)",fontSize:"0.9rem",marginTop:10,fontWeight:800}}>
                        🎖️ {getRankLabel(finalScoreRef.current)}
                      </div>
                    </>
                  : <>
                      <div style={{fontSize:"1.6rem",fontWeight:900,marginBottom:4,color:palette.accentDark}}>
                        {winner}
                      </div>
                      <div className="result-label">のかち！</div>
                      <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:12}}>
                        <div style={{color:"rgba(50,45,0,0.58)",fontWeight:800,fontSize:"0.9rem"}}>
                          {p1Name}：{p1Score}点
                        </div>
                        <div style={{color:"rgba(50,45,0,0.58)",fontWeight:800,fontSize:"0.9rem"}}>
                          {p2Name}：{p2Score}点
                        </div>
                      </div>
                    </>
                }

                <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:28}}>
                  <button className="start-btn"
                    style={{
                      background:palette.accentGrad,
                      boxShadow:`0 4px 20px ${palette.accentShadow}`
                    }}
                    onPointerDown={()=>{
                      screen.includes("time")  ? startSoloTime()  :
                      screen.includes("death") ? startSoloDeath() :
                      startDuo();
                    }}>
                    もう一回！
                  </button>
                  <button className="start-btn secondary" onPointerDown={goTop}>
                    タイトルへ
                  </button>
                </div>
              </div>
            </>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
